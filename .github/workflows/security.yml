name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" | tar -xz gitleaks

      - name: Scan for secrets
        run: ./gitleaks detect --source . --config .gitleaks.toml --no-git --verbose

  env-example-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ensure secrets are not committed
        run: |
          ! git ls-files | grep -E '\.env(\.|$)|\.env\.local$' || \
            (echo "Secret env file tracked in git" && exit 1)
